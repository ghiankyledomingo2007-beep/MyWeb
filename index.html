<!DOCTYPE html>
<html>
<head>
    <title>My First Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        p {
            color: #666;
            text-align: center;
        }
        h2 {
            color: #555;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            border-radius: 10px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <p>This is my first webpage.</p>
    
    <h2>My Hobbies</h2>
    
    <div>
        <p>🎸 Playing guitar</p>
        <img src="Guitar.png" alt="guitar">
    </div>
    
    <div>
        <p>📺 Watching videos on YouTube</p>
        <img src="maxresdefault.jpg" alt="youtube video">
    </div>
    
    <div>
        <p>💻 Coding and discovering new things</p>
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600" alt="coding">
    </div>
    
    <div>
        <p>🎮 Playing games</p>
    </div>
    
    <div>
        <p>💪 Calisthenics workouts</p>
        <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=600" alt="workout">
    </div>
    
    <a href="https://github.com">Visit GitHub</a>
</body>
</html>
